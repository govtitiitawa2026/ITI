  <img id="lightboxImg">

    <script>const images = document.querySelectorAll(".image-box img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");

// Zoom aur Move ke liye variables
let scale = 1;
let isDragging = false;
let startX, startY, translateX = 0, translateY = 0;

images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    
    // Purana Scroll Logic (Taaki position sahi rahe)
    lightbox.style.top = window.scrollY + "px"; 
    
    lightboxImg.src = img.src;
    document.body.style.overflow = "hidden";

    // Reset Zoom & Position jab naya photo khule
    scale = 1;
    translateX = 0;
    translateY = 0;
    applyTransform();
  });
});

// 1. Mouse Wheel Zoom Feature
lightbox.addEventListener("wheel", (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.2 : 0.2;
  scale = Math.min(Math.max(1, scale + delta), 5); // 1x se 5x tak zoom
  applyTransform();
}, { passive: false });

// 2. Mouse Drag (Move) Feature
lightboxImg.addEventListener("mousedown", (e) => {
  if (scale > 1) {
    isDragging = true;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
    lightboxImg.style.cursor = "grabbing";
  }
});

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  translateX = e.clientX - startX;
  translateY = e.clientY - startY;
  applyTransform();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  if(lightboxImg) lightboxImg.style.cursor = "zoom-in";
});

// Transform Apply karne ka function
function applyTransform() {
  lightboxImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
}

// Lightbox band karne ka purana logic
lightbox.addEventListener("click", (e) => {
  if (e.target !== lightboxImg) {
    lightbox.style.display = "none";
    document.body.style.overflow = "auto";
  }
});

// --- Intersection Observer (Aapka Animation Logic) ---
const reveals = document.querySelectorAll(".image-box");
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, index) => {
    if(entry.isIntersecting){
      entry.target.style.transitionDelay = `${index * 0.15}s`;
      entry.target.classList.add("show");
      observer.unobserve(entry.target);
    }
  });
},{ threshold: 0.2 });
reveals.forEach(el => observer.observe(el));
    </script>
